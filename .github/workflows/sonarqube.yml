name: SonarQube Analysis

on:
  push:
    branches: [main, dev, production]
  pull_request:
    branches: [production, dev, test]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Setup backend test structure
      - name: Setup backend test structure
        run: |
          mkdir -p backend-flask/tests
          touch backend-flask/tests/__init__.py
          if [ -f backend-flask/test_app.py ]; then
            mv backend-flask/test_app.py backend-flask/tests/
          fi

      # Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      # Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      # Run frontend tests
      - name: Run frontend tests
        working-directory: frontend-react
        run: npm test -- --coverage --watchAll=false --ci

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: pip

      # Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend-flask
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run backend tests with coverage
      - name: Run backend tests
        working-directory: backend-flask
        run: |
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      # SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

